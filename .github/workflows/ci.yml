name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint y type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias de desarrollo
        run: pip install -e ".[dev]"

      - name: Ruff — linting
        run: ruff check scripts/

      - name: Ruff — formato
        run: ruff format --check scripts/

      - name: Mypy — tipos
        run: mypy scripts/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      SUPABASE_URL: "https://mock.supabase.co"
      SUPABASE_KEY: "mock-key"
      STUDENT_PEPPER: "test-pepper"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest --tb=short -q

  schema-lint:
    name: Validar schema SQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar schema
        env:
          PGPASSWORD: postgres
        run: |
          # Crear schema auth (mock de Supabase)
          psql -h localhost -U postgres -d testdb -c "
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE TABLE IF NOT EXISTS auth.users (
              id uuid PRIMARY KEY DEFAULT gen_random_uuid()
            );
          "
          psql -h localhost -U postgres -d testdb -f scripts/schema.sql
          echo "Schema aplicado correctamente."
